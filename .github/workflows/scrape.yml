name: Scrape YEL Fixtures

on:
  schedule:
    # Run every day at 06:00 UTC (7am BST / 6am GMT)
    - cron: "0 6 * * *"
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

permissions:
  contents: write  # needed to commit the generated .ics files back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install curl_cffi beautifulsoup4 playwright
          playwright install chromium --with-deps
          sudo apt-get update -qq && sudo apt-get install -y -qq tor

      - name: Start Tor proxy
        run: |
          sudo systemctl start tor
          sleep 5
          # Verify Tor is listening on SOCKS5 port
          curl --socks5-hostname 127.0.0.1:9050 -s https://check.torproject.org/api/ip | head -c 200

      - name: Run scraper
        env:
          SOCKS_PROXY: socks5h://127.0.0.1:9050
          DEBUG: "1"
        run: |
          # Clear old calendars and feeds so removed teams/leagues don't linger
          rm -rf calendars/ feeds/
          python scraper/scrape.py

      - name: Commit updated calendars and feeds
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A calendars/ feeds/
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: update fixtures $(date -u +'%Y-%m-%d')"
          git push
